<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Taklifnoma</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  text-align:center;
  background: linear-gradient(135deg,#fff0f5,#ffe4e1);
}

/* LOCK */
.lock {
  height:100vh;
  background:black;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* CONTENT */
.content {
  display:none;
  padding:20px;
}

h1 { color:#d63384; }

button {
  padding:12px 25px;
  border:none;
  border-radius:10px;
  background:hotpink;
  color:white;
  font-size:16px;
}

/* RSVP */
input, select {
  padding:10px;
  width:80%;
  margin:5px;
}

/* COUNTDOWN */
#countdown { font-size:20px; margin:15px; }

/* PETALS */
.petal {
  position:fixed;
  top:-10px;
  animation:fall linear infinite;
}
@keyframes fall {
  to { transform:translateY(100vh); }
}
</style>
</head>

<body>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<div class="lock">
  <h2>💌 Sizga maxsus taklifnoma</h2>
  <button onclick="openSite()">Ochish 🔓</button>
</div>

<div class="content">

<h2 id="guest"></h2>

<h1>TEMURBEK ❤️ NODIRABEGIM</h1>
<p>Sizni to‘yimizga taklif qilamiz</p>

<p>📅 28-avgust 2028</p>
<p>📍 Sho'rchi tumani</p>

<div id="countdown"></div>

<!-- RSVP -->
<h3>📩 Ishtirokni tasdiqlang</h3>
<input id="nameInput" placeholder="Ismingiz">
<select id="status">
<option>Kelaman ✅</option>
<option>Kela olmayman ❌</option>
</select>
<br>
<button onclick="sendRSVP()">Yuborish</button>

<br><br>

<!-- MAP -->
<iframe src="https://maps.google.com/maps?q=Sho'rchi&output=embed" width="100%" height="250"></iframe>

<br><br>
<button onclick="share()">📲 Ulash</button>

</div>

<script>
/* OPEN */
function openSite(){
 document.querySelector('.lock').style.display='none';
 document.querySelector('.content').style.display='block';
 document.getElementById("music").play();
}

/* NAME FROM URL */
let params=new URLSearchParams(window.location.search);
let n=params.get("name");
if(n){ document.getElementById("guest").innerHTML="Hurmatli "+n+"!"; }

/* COUNTDOWN */
let target=new Date("August 28, 2028").getTime();
setInterval(()=>{
 let now=new Date().getTime();
 let d=Math.floor((target-now)/(1000*60*60*24));
 document.getElementById("countdown").innerHTML="⏳ "+d+" kun qoldi";
},1000);

/* PETALS */
setInterval(()=>{
 let p=document.createElement("div");
 p.className="petal";
 p.innerHTML="🌸";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(Math.random()*3+2)+"s";
 document.body.appendChild(p);
 setTimeout(()=>p.remove(),5000);
},300);

/* TELEGRAM BOT */
function sendRSVP(){
 let name=document.getElementById("nameInput").value;
 let status=document.getElementById("status").value;

 if(name===""){ alert("Iltimos ismingizni kiriting"); return; }

 // XAVFSIZ TOKEN / CHAT
 let token="8644092651:AAE6l6tZGXGkVybOqjtcfFWWi8PeHQvfcKA";
 let chat="1483884514";

 let text=`💌 RSVP:\nIsm: ${name}\nHolati: ${status}`;

 fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${text}`)
 .then(()=>{
   alert("Rahmat, siz ro‘yxatga olindingiz ❤️");
   document.getElementById("nameInput").value="";
   document.getElementById("status").selectedIndex=0;
 })
 .catch(()=>{ alert("Xatolik! Tekshirib qaytadan urinib ko‘ring"); });
}

/* SHARE */
function share(){
 let url=window.location.href;
 window.open("https://t.me/share/url?url="+url);
}
</script>

</body>
</html>
